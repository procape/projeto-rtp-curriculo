# Banco de dados
services:
  db:
    image: mysql:8.0
    container_name: mysql_curriculo_rtp
    restart: always
    
    env_file:
      - .env
    
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}

    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql


# Backend
  backend:
    build: ./backend
    container_name: backend_curriculo_rtp
    restart: always
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=${MYSQL_PORT}
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - "${BACKEND_PORT}:5000"
    depends_on:
      - db
  
# Frontend
  frontend:
    build: ./frontend
    container_name: frontend_curriculo_rtp
    restart: always
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend 

volumes:
  db_data: