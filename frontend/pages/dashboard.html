<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="../styles/style.css">

</head>

<body>

    <nav id="sidebar" class="collapsed">
        <div class="sidebar-header p-4">
            <h3>Painel Admin</h3>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link active bg-primary text-white mb-2 mx-2 rounded" href="#">
                    <i class="bi bi-file-earmark-person"></i>
                    <span class="link-text">Currículos</span>
                </a>
            </li>
            <li class="nav-item mt-4">
                <a class="nav-link mx-2 text-danger" href="../index.html">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="link-text">Sair</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title mb-4">Gerenciamento de Currículos</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th scope="col" class="text-secondary fw-normal">CANDIDATO</th>
                                <th scope="col" class="text-secondary fw-normal">ÁREA DE ATUAÇÃO</th>
                                <th scope="col" class="text-secondary fw-normal">ESCOLARIDADE</th>
                                <th scope="col" class="text-secondary fw-normal text-end">AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody id="corpo_tabela_usuarios">
                            <tr>
                                <td colspan="4" class="text-center text-secondary">Carregando dados do servidor...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="contador_registros" class="mt-3 text-secondary small">
                    Calculando registros...
                </div>
            </div>
        </div>

        <div class="modal fade" id="modalExcluir" tabindex="-1" aria-labelledby="exemploModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="exemploModalLabel">Confirmar Exclusão</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        Tem certeza que deseja excluir este currículo? Esta ação não pode ser desfeita.
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-danger" id="confirmarExclusao">Sim</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer>
        <img src="../assets/CoraA7A3o_de_cristal_em_tons_vibrantes.png" alt="coração de cristal">
    </footer>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

<script src="../js/scripts_globais.js"></script>

</html>
