<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Plataforma de Sistemas Integrados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body class="bg-light">
    <div class="d-flex justify-content-center align-items-center min-vh-100 py-5">

        <div class="card shadow rounded-4 border-0 p-0 text-start" style="width: 450px; max-width: 95%;">

            <div class="p-3 rounded-top-4 text-center"
                style="background-color: #B22222; border-bottom: 2px solid #990000;">
                <h3 class="m-0 text-white fw-bold h4">RECUPERAR SENHA</h3>
            </div>

            <div class="card-body p-4 pt-4">

                <p class="text-secondary mb-4 text-center" style="font-size: 0.95rem;">
                    Informe o e-mail associado à sua conta e enviaremos as instruções para você criar uma nova senha.
                </p>

                <form method="POST" action="" class="mb-0">
                    <div class="row g-3">

                        <div class="col-12">
                            <label for="email" class="form-label mb-1 fw-bold text-dark"><small>E-mail Cadastrado <span
                                        class="text-danger">*</span></small></label>
                            <input type="email" name="email" id="email" maxlength="150" placeholder="Digite seu e-mail"
                                class="form-control p-2" required>
                        </div>

                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn fw-bold p-2 shadow-sm rounded-3 text-white w-100"
                            style="background-color: #B22222; border: none; border-bottom: 2px solid #990000; transition: 0.3s;"
                            onmouseover="this.style.backgroundColor='#990000';"
                            onmouseout="this.style.backgroundColor='#B22222';">
                            ENVIAR LINK DE ACESSO </button>
                    </div>

                    <p class="text-center mt-4 mb-0 text-secondary">
                        <small>Lembrou a senha? <a href="../index.html" class="text-decoration-none fw-bold"
                                style="color: #1D4587;">Voltar para o Login</a></small>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <img src="../assets/CoraA7A3o_de_cristal_em_tons_vibrantes.png" alt="coração de cristal">
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="js/scripts_globais.js"></script>
</body>

</html>
